<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AskDrive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="app-header">
      <img src="AskDrive.png" alt="AskDrive Logo" class="logo" />
      <h1>AskDrive</h1>
    </header>

    <!-- Chatbox -->
    <div class="chatbox" id="chatbox">
      <div class="placeholder">
        💬 Ask me anything about your Google Drive folder...
      </div>
    </div>

    <!-- Input Area -->
    <form id="chat-form" class="chat-form">
      <input 
        type="text" 
        id="user-input" 
        placeholder="Type your question..." 
        autocomplete="off" 
      />
      <button type="submit" title="Send">📤</button>
    </form>
  </div>

  <script src="popup.js"></script>
</body>
</html>
